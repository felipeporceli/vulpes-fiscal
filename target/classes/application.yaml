spring:
  application:
    name: VulpesFiscal

  datasource:
    url: jdbc:postgresql://localhost:5432/vulpesfiscaldb
    username: vulpesfiscal
    password: vulpesfiscal
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    date-format: dd/MM/yyyy
    time-zone: America/Sao_Paulo
    deserialization:
      fail-on-unknown-properties: true