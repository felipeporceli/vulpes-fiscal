spring:
  application:
    name: VulpesFiscal

  datasource:
    url: jdbc:postgresql://localhost:5432/vulpesfiscal
    username: vulpesfiscal
    password: vulpesfiscal
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  jackson:
    date-format: dd/MM/yyyy
    time-zone: America/Sao_Paulo
    deserialization:
      fail-on-unknown-properties: true

rsa:
  private-key: classpath:certs/private.pem
  public-key: classpath:certs/public.pem

logging:
  level:
    org.springframework.security: DEBUG
    org.springframework.security.oauth2: TRACE
springdoc:
  override-with-generic-response: false

focusnfe:
  url: "https://homologacao.focusnfe.com.br"
  mock: true

encryption:
  # Em produção, defina via variável de ambiente: ENCRYPTION_SECRET_KEY=<chave-forte>
  secret-key: ${ENCRYPTION_SECRET_KEY:vulpes-fiscal-dev-key-nao-usar-em-prod}